<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');

        .sms-root {
            font-family: 'DM Sans', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(14, 165, 233, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.07) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .bg-glow {
            position: absolute;
            width: 700px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.10) 0%, transparent 70%);
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .sms-navbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 36px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.12);
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(12px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: 0.04em;
        }

        .brand-name span {
            color: #0ea5e9;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .btn-ghost {
            padding: 8px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: transparent;
            color: #334155;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn-ghost:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .btn-solid {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-solid:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .hero {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 72px 32px 60px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border: 1px solid rgba(14, 165, 233, 0.25);
            border-radius: 100px;
            background: rgba(14, 165, 233, 0.07);
            color: #0284c7;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #0ea5e9;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .hero-title {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: clamp(28px, 5vw, 46px);
            color: #0f172a;
            line-height: 1.2;
            max-width: 680px;
            margin-bottom: 18px;
        }

        .hero-title em {
            font-style: italic;
            color: #0ea5e9;
        }

        .hero-sub {
            font-size: 15px;
            line-height: 1.75;
            color: #64748b;
            max-width: 500px;
            margin-bottom: 36px;
        }

        .hero-cta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-cta {
            padding: 13px 28px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-cta-main {
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            color: #fff;
            border: none;
        }

        .btn-cta-main:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        .messages {
            margin-bottom: 15px;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .message.error {
            background: #ffdddd;
            color: #a94442;
        }

        .message.success {
            background: #ddffdd;
            color: #3c763d;
        }
    </style>
    {% block extra_css%}{%endblock%}
</head>

<body>
    {%block content%}
    {%endblock%}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
